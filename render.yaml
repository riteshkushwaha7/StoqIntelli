services:
  - type: web
    name: stoqintelli-ml
    env: python
    rootDir: ml-service
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"

